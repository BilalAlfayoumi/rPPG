# fly.toml app configuration file generated for rppg-monitor on 2026-06-27T19:18:31+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rppg-monitor'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'    # ne jamais arrêter la machine (always-on)
  auto_start_machines = true
  min_machines_running = 1       # au moins 1 machine toujours active

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
